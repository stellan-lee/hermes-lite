#
# docker-compose.yml for Marlow Agent
#
# Usage:
#   MARLOW_UID=$(id -u) MARLOW_GID=$(id -g) docker compose up -d
#
# Set MARLOW_UID / MARLOW_GID to the host user that owns ~/.marlow so
# files created inside the container stay readable/writable on the host.
# The s6-overlay stage2 hook remaps the internal `marlow` user to these
# values via usermod/groupmod; each supervised service then drops to that
# user via `s6-setuidgid`.
#
# Security notes:
#   - If you override entrypoint, keep `/init` as the first command in
#     the chain (or let docker use the image's default ENTRYPOINT,
#     which is `["/init", "/opt/marlow/docker/main-wrapper.sh"]`).
#     `/init` is s6-overlay's PID 1 — it runs the cont-init.d scripts
#     (chown and profile reconcile) and sets up the
#     supervision tree before any service starts. Bypassing it skips
#     all of that setup and the gateway will not work correctly.
#
services:
  gateway:
    build: .
    image: marlow-agent
    container_name: marlow
    restart: unless-stopped
    network_mode: host
    volumes:
      - ~/.marlow:/opt/data
    environment:
      - MARLOW_UID=${MARLOW_UID:-10000}
      - MARLOW_GID=${MARLOW_GID:-10000}
    command: ["gateway", "run"]
